<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目浏览 - 创途领航</title>
    <link href="./css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./css/index.css">
    <link rel="stylesheet" href="./css/project.css">
    <link rel="stylesheet" href="./css/common.css">
</head>
<body>

    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg bg-dark navbar-dark shadow-sm">
        <div class="container">
            <a href="index.html" class="navbar-brand fw-bold d-flex align-items-center">
                创途领航
                <img src="./images/logo.png" alt="创途领航 logo" class="ms-2" style="width: 32px; height: 32px; object-fit: contain;">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navmenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navmenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="study.html">学习资源</a></li>
                    <li class="nav-item"><a class="nav-link" href="competition.html">资讯广场</a></li>
                    <li class="nav-item"><a class="nav-link active" href="project.html">项目浏览</a></li>
                    <li class="nav-item"><a class="nav-link" href="personal.html">个人中心</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="bg-full"></div>

    <!-- 页面标题 -->
    <section class="py-4">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h1 class="fw-bold mb-1">项目浏览</h1>
                    <p class="text-muted mb-0">发现优秀项目，激发创作灵感</p>
                </div>
                <div>
                    <a href="project-up.html" class="btn btn-primary">上传项目</a>
                </div>
            </div>
        </div>
    </section>

    <!-- 搜索与筛选 -->
    <section class="py-3">
        <div class="container">
            <div class="row g-3 align-items-center">
                <div class="col-md-6">
                    <div class="input-group">
                        <input type="text" class="form-control" id="searchInput" placeholder="搜索项目名称、关键词...">
                        <button class="btn btn-primary" type="button" id="searchBtn">搜索</button>
                    </div>
                </div>
                <div class="col-md-3">
                    <select class="form-select" id="categorySelect">
                        <option value="">全部分类</option>
                        <option value="web">Web 开发</option>
                        <option value="mobile">移动应用</option>
                        <option value="ai">人工智能</option>
                        <option value="data">数据分析</option>
                    </select>
                </div>
                <div class="col-md-3 text-end">
                    <span class="text-muted small" id="resultInfo">共找到 12 个项目</span>
                </div>
            </div>
        </div>
    </section>

    <!-- 项目列表 -->
    <section class="py-4" id="projectListSection">
        <div class="container">
            <div class="row g-4" id="projectList">
                <!-- 动态加载项目卡片 -->
            </div>

            <!-- 分页 -->
            <nav class="mt-5" id="projectPagination">
                <ul class="pagination justify-content-center">
                    <!-- 动态生成分页 -->
                </ul>
            </nav>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="bg-dark text-white-50 text-center py-4 mt-auto">
        <div class="container">
            <p class="mb-1">&copy; 2026 创途领航。保留所有权利。</p>
            <p class="small">联系我们 | 隐私政策 | 服务条款</p>
        </div>
    </footer>

    <script src="./js/bootstrap.bundle.min.js"></script>
    <script src="/js/project.js"></script>
</body>
</html>
