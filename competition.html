<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资讯广场 - 创途领航</title>
    <link href="./css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/competition.css">
    <link rel="stylesheet" href="./css/common.css">
</head>
<body>

    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg bg-dark navbar-dark shadow-sm">
        <div class="container">
            <a href="index.html" class="navbar-brand fw-bold">
                <img src="./images/logo.png" alt="logo" class="me-2" style="width: 32px; height: 32px; object-fit: contain;">
                创途领航
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navmenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navmenu">
                <ul class="navbar-nav ms-auto">
                      <li class="nav-item"><a class="nav-link " href="study.html">学习资源</a></li>
                    <li class="nav-item"><a class="nav-link active" href="competition.html">资讯广场</a></li>
                    <li class="nav-item"><a class="nav-link" href="project.html">项目浏览</a></li>
                    <li class="nav-item"><a class="nav-link" href="personal.html">个人中心</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="bg-full"></div>

    <!-- 页面标题 -->
    <section class="page-header">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h1 class="fw-bold mb-1">资讯广场</h1>
                    <p class="text-muted mb-0">获取最新比赛资讯，把握参赛机会</p>
                </div>
                <div>
                    <a href="#" class="btn btn-outline-primary" id="subscribeBtn">
                        📬 订阅通知
                    </a>
                </div>
            </div>
        </div>
    </section>

    <!-- 搜索与筛选 -->
    <section class="py-3">
        <div class="container">
            <div class="row g-3">
                <div class="col-md-6">
                    <div class="input-group">
                        <input type="text" class="form-control" id="searchInput" placeholder="搜索比赛名称...">
                        <button class="btn btn-primary" type="button" id="searchBtn">搜索</button>
                    </div>
                </div>
                <div class="col-md-3">
                    <select class="form-select" id="typeSelect">
                        <option value="">全部类型</option>
                        <option value="competition">比赛链接</option>
                        <option value="notice">大赛通知</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <select class="form-select" id="statusSelect">
                        <option value="">全部状态</option>
                        <option value="ongoing">进行中</option>
                        <option value="upcoming">即将开始</option>
                        <option value="ended">已结束</option>
                    </select>
                </div>
            </div>
        </div>
    </section>

    <!-- 内容区域 -->
    <section class="py-4 flex-grow-1">
        <div class="container">
            <div class="row">
                <div class="col-12">                  
                    <!-- 热门资讯（移到顶部） -->
                    <div class="mb-5">
                        <div class="card border-0 shadow-sm">
                            <div class="card-body">
                                <h5 class="fw-bold mb-3">🔥 热门资讯</h5>
                                <ul class="list-unstyled mb-0 hot-list" id="hotList">
                                    <!-- 动态加载热门资讯 -->
                                </ul>
                            </div>
                        </div>
                    </div>

                    <!-- 比赛链接 -->
                    <div class="mb-5" id="competitionSection">
                        <h4 class="fw-bold mb-3">🏆 比赛链接</h4>
                        <div class="row g-3" id="competitionList">
                            <!-- 动态加载比赛卡片 -->
                        </div>
                        
                        <!-- 分页控件 -->
                        <nav class="mt-4" id="competitionPagination">
                            <ul class="pagination justify-content-center">
                                <!-- 动态生成分页 -->
                            </ul>
                        </nav>
                    </div>

                    <!-- 大赛通知 -->
                    <div id="noticeSection">
                        <h4 class="fw-bold mb-3">📢 大赛通知</h4>
                        <div class="list-group notice-list" id="noticeList">
                            <!-- 动态加载通知列表 -->
                        </div>
                        
                        <!-- 查看更多按钮 -->
                        <div class="text-center mt-3" id="noticeMoreBtn">
                            <button class="btn btn-outline-primary" id="toggleNoticeBtn">
                                查看更多 ▼
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- 页脚 -->
    <footer class="bg-dark text-white-50 text-center py-4 mt-auto">
        <div class="container">
            <p class="mb-1">&copy; 2026 创途领航。保留所有权利。</p>
            <p class="small">联系我们 | 隐私政策 | 服务条款</p>
        </div>
    </footer>

    <script src="./js/bootstrap.bundle.min.js"></script>
    
    <script src="./js/competition.js"></script>
    
</body>
</html>
