<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习详情 - 创途领航</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/study-detail.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg bg-dark navbar-dark shadow-sm">
        <div class="container">
            <a href="index.html" class="navbar-brand fw-bold">
                <img src="/images/logo.png" alt="logo" class="me-2" style="width: 32px; height: 32px; object-fit: contain;">
                创途领航
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navmenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navmenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="study.html">学习资源</a></li>
                    <li class="nav-item"><a class="nav-link" href="competition.html">资讯广场</a></li>
                    <li class="nav-item"><a class="nav-link" href="project.html">项目浏览</a></li>
                    <li class="nav-item"><a class="nav-link" href="personal.html">个人中心</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="bg-full"></div>

    <!-- 返回按钮 -->
    <section class="py-3 ">
        <div class="container">
            <a href="study.html" class="btn btn-outline-secondary btn-sm">← 返回资源列表</a>
        </div>
    </section>

    <!-- 学习详情内容 -->
    <section class="py-4">
        <div class="container">
            <!-- 资源标题 -->
            <div class="mb-4">
                <h1 class="fw-bold mb-2" id="resourceTitle">加载中...</h1>
                <div class="d-flex align-items-center gap-3">
                    <span class="badge bg-primary" id="resourceCategory">分类</span>
                    <span class="badge bg-success" id="resourceLevel">难度</span>
                    <span class="text-muted small"><span id="viewCount">0</span> </span>
                    <span class="text-muted small"> <span id="likeCount">0</span> </span>
                </div>
            </div>

            <!-- 资源简介 -->
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-body">
                    <h5 class="fw-bold mb-3">📋 资源简介</h5>
                    <p class="card-text text-muted" id="resourceDesc">加载中...</p>
                </div>
            </div>

            <!-- 视频资料 -->
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-header bg-white border-0 py-3">
                    <h5 class="fw-bold mb-0">🎬 视频资料</h5>
                    <p class="small text-muted">（来源：哔哩哔哩）</p>
                </div>
                <div class="card-body">
                    <div id="videoList"></div>
                </div>
            </div>

            <!-- 文档资料 -->
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-header bg-white border-0 py-3">
                    <h5 class="fw-bold mb-0">📚 文档资料（20 篇）</h5>
                    <p class="small text-muted">（来源：网络）</p>
                </div>
                <div class="card-body">
                    <div id="documentList"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="bg-dark text-white-50 text-center py-4 mt-auto">
        <div class="container">
            <p class="mb-1">&copy; 2026 创途领航。保留所有权利。</p>
            <p class="small">联系我们 | 隐私政策 | 服务条款</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/study-detail.js"></script>
</body>
</html>
