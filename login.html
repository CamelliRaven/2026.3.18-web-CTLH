<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创途领航 - 登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/login.css">
    <link rel="stylesheet" href="/css/common.css">
</head>
<body>
   
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg bg-dark navbar-dark shadow-sm">
        <div class="container">
            <a href="index.html" class="navbar-brand fw-bold">
                <img src="/images/logo.png" alt="logo" class="me-2" style="width: 32px; height: 32px; object-fit: contain;">
                创途领航
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navmenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navmenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html#resources">学习资源</a></li>
                    <li class="nav-item"><a class="nav-link " href="competition.html">资讯广场</a></li>
                    <li class="nav-item"><a class="nav-link" href="project.html">项目浏览</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html#profile">个人中心</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 背景图 -->
    <div class="bg-full"></div>

    <!-- 登录容器 -->
    <div class="login-container">
        <div class="login-wrapper">
            <div class="login-card">
                <h2 class="text-center mb-4">登入账号</h2>
                <form id="loginForm">
                    <div class="mb-3">
                        <label for="username" class="form-label">用户名</label>
                        <input type="text" class="form-control" id="username" placeholder="请输入用户名" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">密码</label>
                        <input type="password" class="form-control" id="password" placeholder="请输入密码" required>
                    </div>
                    <div class="text-center mb-3">
                        <a href="#" class="text-decoration-none text-muted">忘记密码？</a>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">SIGN IN</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/login.js"></script>
</body>
</html>
